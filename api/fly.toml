app = "ezmotoflow-api"
primary_region = "gru"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT     = "3000"

[http_service]
  internal_port        = 3000
  force_https          = true
  auto_stop_machines   = false
  auto_start_machines  = true
  min_machines_running = 1

  [http_service.concurrency]
    type       = "requests"
    hard_limit = 250
    soft_limit = 200

[[vm]]
  size   = "shared-cpu-1x"
  memory = "512mb"

[deploy]
  release_command = "node -e \"const { execSync } = require('child_process'); execSync('npx prisma migrate deploy', { stdio: 'inherit' });\""
